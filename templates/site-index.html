<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>One-shot game showcase</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        max-width: 68rem;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
        color: #111;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
      }
      .lede {
        margin: 0 0 1.25rem;
        color: #333;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1rem;
        margin: 1.2rem 0 0;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }
      .card img {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 16/10;
        object-fit: cover;
        background: #f3f3f3;
      }
      .card-body {
        padding: 0.8rem 0.9rem 1rem;
      }
      .card h2 {
        font-size: 1.05rem;
        margin: 0 0 0.35rem;
      }
      .meta {
        margin: 0;
        color: #555;
        font-size: 0.94rem;
      }
      .note {
        margin-top: 0.55rem;
        padding: 0.55rem 0.6rem;
        border-radius: 8px;
        background: #f6f8ff;
        border: 1px solid #dbe4ff;
        font-size: 0.92rem;
        color: #1f2f5f;
      }
      .note-title {
        margin: 0 0 0.3rem;
        font-weight: 600;
      }
      .note-stack {
        margin: 0 0 0.35rem;
      }
      .note-list {
        margin: 0;
        padding-left: 1.1rem;
      }
      .note-list li + li {
        margin-top: 0.2rem;
      }
      a {
        color: #0b57d0;
      }
      code {
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <h1>One-shot game showcase</h1>
    <p class="lede">Each entry is a separate model run; assets and code live in that folder.</p>
    <section class="grid">{{CARDS}}</section>
  </body>
</html>
